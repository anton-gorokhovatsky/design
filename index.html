    <script>
      (() => {
        let savedTheme = null;

        try {
          savedTheme = window.localStorage.getItem("anton-theme");
        } catch {
          savedTheme = null;
        }

        const theme = savedTheme === "light" || savedTheme === "dark"
          ? savedTheme
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]').content = theme === "dark" ? "#171817" : "#f8f8f6";
      })();
    </script>
